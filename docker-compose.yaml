services:
  # Base de datos para el microservicio de Autenticación
  mysql-auth:
    image: mysql:8.0
    container_name: mysql-auth
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_AUTH_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_auth_data:/var/lib/mysql
    networks:
      - crediya-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  # Base de datos para el microservicio de Préstamos
  mysql-loan:
    image: mysql:8.0
    container_name: mysql-loan
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_LOAN_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_loan_data:/var/lib/mysql
    networks:
      - crediya-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  # LocalStack para servicios AWS simulados
  localstack:
    container_name: localstack
    image: localstack/localstack:stable
    ports:
      - "127.0.0.1:4566:4566" # LocalStack Gateway
      - "127.0.0.1:4510-4559:4510-4559" # external services port range
    environment:
      # LocalStack configuration: https://docs.localstack.cloud/references/configuration/
      - SERVICES=s3,sqs,secretsmanager,sns
      - DEBUG=${DEBUG:-0}
      - AWS_ACCESS_KEY_ID=test # default AWS credentials
      - AWS_SECRET_ACCESS_KEY=test # default AWS credentials
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack" # LocalStack data volume
      - "/var/run/docker.sock:/var/run/docker.sock"

  # Microservicio de Autenticación
  ms-autenticacion:
    build:
      context: ./ms_autenticacion
      dockerfile: Dockerfile
    container_name: ms-autenticacion
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_USER_GENERATOR: ${JWT_USER_GENERATOR}
      SPRING_R2DBC_URL: r2dbc:mysql://mysql-auth:3306/crediya_autenticacion_db?serverTimezone=UTC
    ports:
      - "8080:8080"
    depends_on:
      mysql-auth:
        condition: service_healthy
    networks:
      - crediya-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      timeout: 30s
      retries: 5
      interval: 30s
    restart: unless-stopped

  # Microservicio de Solicitudes
  ms-solicitudes:
    build:
      context: ./ms_solicitudes
      dockerfile: Dockerfile
    container_name: ms-solicitudes
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_USER_GENERATOR: ${JWT_USER_GENERATOR}
      SPRING_R2DBC_URL: r2dbc:mysql://mysql-loan:3306/crediya_solicitudes_db?serverTimezone=UTC
      MS_AUTENTICACION_URL: http://ms-autenticacion:8080
    ports:
      - "8081:8081"
    depends_on:
      mysql-loan:
        condition: service_healthy
    networks:
      - crediya-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      timeout: 30s
      retries: 5
      interval: 30s
    restart: unless-stopped

volumes:
  mysql_auth_data:
    driver: local
  mysql_loan_data:
    driver: local

networks:
  crediya-network:
    driver: bridge